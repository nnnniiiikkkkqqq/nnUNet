name: nnunet
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch::pytorch::2.0
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda
  - numpy
  - scipy
  - scikit-image
  - scikit-learn
  - matplotlib
  - pandas
  - imageio
  - nibabel
  - tqdm
  - tensorboard
  - pip
  - pip:
    - nnunetv2
    - batchgenerators
    - acvl-utils
    - monai
    - PyYAML
    - hydra-core
    - albumentations
    - requests
